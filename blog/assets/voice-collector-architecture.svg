<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Voice Collector 本地优先架构</title>
  <desc id="desc">Apple Watch 把录音交给 iPhone，iPhone 与 iPad 再传到 Mac，由 Mac 保存、转写并建立本地知识库。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#102a2a"/><stop offset="1" stop-color="#1d4542"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="10" stdDeviation="12" flood-opacity=".22"/></filter>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1080" cy="88" r="170" fill="#e8754f" opacity=".13"/>
  <circle cx="145" cy="650" r="210" fill="#4ab5a6" opacity=".1"/>
  <text x="80" y="96" fill="#f8f4e9" font-family="system-ui,sans-serif" font-size="46" font-weight="760">VOICE COLLECTOR</text>
  <text x="82" y="140" fill="#a8c7c2" font-family="system-ui,sans-serif" font-size="22">Local first · Store first · Device-aware</text>
  <g filter="url(#shadow)" font-family="system-ui,sans-serif">
    <rect x="78" y="252" width="205" height="170" rx="32" fill="#f8f4e9"/>
    <rect x="126" y="276" width="110" height="105" rx="28" fill="#173936"/>
    <path d="M161 327c10-22 20 22 31 0s20 22 31 0" fill="none" stroke="#e8754f" stroke-width="8" stroke-linecap="round"/>
    <text x="180" y="403" text-anchor="middle" fill="#173936" font-size="21" font-weight="700">WATCH</text>
    <text x="180" y="453" text-anchor="middle" fill="#b9d2cd" font-size="17">快速启动</text>

    <rect x="389" y="215" width="226" height="245" rx="28" fill="#f8f4e9"/>
    <rect x="420" y="244" width="164" height="156" rx="14" fill="#dcebe7"/>
    <path d="M446 322h22l14-28 22 56 18-38 16 10h20" fill="none" stroke="#16766d" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="502" cy="430" r="9" fill="#173936"/>
    <text x="502" y="492" text-anchor="middle" fill="#b9d2cd" font-size="17">移动采集 + 中继</text>

    <rect x="720" y="188" width="480" height="310" rx="18" fill="#f8f4e9"/>
    <rect x="746" y="216" width="428" height="226" rx="8" fill="#e4efeb"/>
    <rect x="780" y="251" width="150" height="154" rx="10" fill="#fff"/>
    <rect x="953" y="251" width="188" height="36" rx="7" fill="#173936"/>
    <rect x="953" y="307" width="188" height="18" rx="5" fill="#7ba79f"/>
    <rect x="953" y="343" width="146" height="18" rx="5" fill="#9bbdb7"/>
    <rect x="953" y="379" width="174" height="18" rx="5" fill="#e8754f"/>
    <path d="M804 342c17-48 29 45 49-5s31 43 53-11" fill="none" stroke="#e8754f" stroke-width="8" stroke-linecap="round"/>
    <path d="M871 498h178l35 36H836z" fill="#dcebe7"/>
    <text x="960" y="575" text-anchor="middle" fill="#f8f4e9" font-size="25" font-weight="700">MAC · DATA CENTER</text>
    <text x="960" y="610" text-anchor="middle" fill="#a8c7c2" font-size="18">保存 · Whisper 转写 · 搜索 · 本地 AI</text>
  </g>
  <g fill="none" stroke="#e8754f" stroke-width="7" stroke-linecap="round" stroke-linejoin="round">
    <path d="M292 336h72"/><path d="m350 320 16 16-16 16"/>
    <path d="M629 336h65"/><path d="m680 320 16 16-16 16"/>
  </g>
  <text x="640" y="676" text-anchor="middle" fill="#dcebe7" font-family="system-ui,sans-serif" font-size="20">先保存，再发送；收到确认，责任才转移</text>
</svg>
