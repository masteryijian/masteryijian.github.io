<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">FDE interview preparation roadmap</title>
  <desc id="desc">A four-stage path from engineering foundations through AI agent delivery to customer outcomes.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#102d2b"/>
      <stop offset="1" stop-color="#17665e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#071d1b" flood-opacity=".3"/>
    </filter>
  </defs>
  <rect width="1200" height="630" rx="28" fill="url(#bg)"/>
  <circle cx="1080" cy="80" r="180" fill="#2a8a7e" opacity=".22"/>
  <circle cx="90" cy="590" r="230" fill="#e66f47" opacity=".13"/>
  <text x="72" y="92" fill="#8dd6ca" font-family="Arial, sans-serif" font-size="22" font-weight="700" letter-spacing="3">FORWARD DEPLOYED ENGINEER</text>
  <text x="72" y="151" fill="#fff" font-family="Arial, 'PingFang SC', sans-serif" font-size="46" font-weight="800">FDE 面试准备路线图</text>
  <text x="72" y="191" fill="#d9ece8" font-family="Arial, 'PingFang SC', sans-serif" font-size="24">从“会写代码”走到“对客户结果负责”</text>
  <g filter="url(#shadow)">
    <rect x="72" y="250" width="240" height="236" rx="18" fill="#f8f3e9"/>
    <rect x="330" y="250" width="240" height="236" rx="18" fill="#f8f3e9"/>
    <rect x="588" y="250" width="240" height="236" rx="18" fill="#f8f3e9"/>
    <rect x="846" y="250" width="282" height="236" rx="18" fill="#f8f3e9"/>
  </g>
  <g font-family="Arial, 'PingFang SC', sans-serif">
    <text x="96" y="292" fill="#e66f47" font-size="18" font-weight="800">P0 · ENGINEERING</text>
    <text x="96" y="336" fill="#163c38" font-size="28" font-weight="800">Python + 测试</text>
    <text x="96" y="376" fill="#48625f" font-size="20">干净代码</text>
    <text x="96" y="408" fill="#48625f" font-size="20">Unit / E2E</text>
    <text x="96" y="440" fill="#48625f" font-size="20">安全边界</text>

    <text x="354" y="292" fill="#e66f47" font-size="18" font-weight="800">P0 · AI SYSTEM</text>
    <text x="354" y="336" fill="#163c38" font-size="28" font-weight="800">Agent 落地</text>
    <text x="354" y="376" fill="#48625f" font-size="20">RAG / Tool Call</text>
    <text x="354" y="408" fill="#48625f" font-size="20">Guardrail / Eval</text>
    <text x="354" y="440" fill="#48625f" font-size="20">Fallback</text>

    <text x="612" y="292" fill="#e66f47" font-size="18" font-weight="800">P0 · DELIVERY</text>
    <text x="612" y="336" fill="#163c38" font-size="28" font-weight="800">端到端交付</text>
    <text x="612" y="376" fill="#48625f" font-size="20">REST / Service</text>
    <text x="612" y="408" fill="#48625f" font-size="20">UI / CLI / Docker</text>
    <text x="612" y="440" fill="#48625f" font-size="20">可观测性</text>

    <text x="870" y="292" fill="#e66f47" font-size="18" font-weight="800">P0 · OUTCOME</text>
    <text x="870" y="336" fill="#163c38" font-size="28" font-weight="800">客户结果</text>
    <text x="870" y="376" fill="#48625f" font-size="20">发现真实问题</text>
    <text x="870" y="408" fill="#48625f" font-size="20">控制信息粒度</text>
    <text x="870" y="440" fill="#48625f" font-size="20">建立信任</text>
  </g>
  <path d="M188 524H1012" stroke="#8dd6ca" stroke-width="5" stroke-linecap="round"/>
  <circle cx="188" cy="524" r="10" fill="#e66f47"/><circle cx="446" cy="524" r="10" fill="#e66f47"/><circle cx="704" cy="524" r="10" fill="#e66f47"/><circle cx="1012" cy="524" r="10" fill="#e66f47"/>
  <text x="72" y="582" fill="#d9ece8" font-family="Arial, 'PingFang SC', sans-serif" font-size="22">Understand → Build → Deploy → Iterate · 最终证据：一个可演示、可测量、可复盘的项目</text>
</svg>
